name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Asset Catalog Integrity Guard
        run: |
          chmod +x ./scripts/release/check_asset_catalog_integrity.sh
          ./scripts/release/check_asset_catalog_integrity.sh

      - name: Localization Integrity Guard
        run: |
          chmod +x ./scripts/check_localization.py
          ./scripts/check_localization.py --catalog Moaiy/Resources/Localizable.xcstrings

      - name: Pro Contracts Integrity Guard
        run: |
          chmod +x ./scripts/check_pro_contracts.py
          ./scripts/check_pro_contracts.py

      - name: Build
        run: |
          xcodebuild -project Moaiy/Moaiy.xcodeproj \
            -scheme Moaiy \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        run: |
          xcodebuild test -project Moaiy/Moaiy.xcodeproj \
            -scheme MoaiyTests \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Workaround iconcomposer crash on CI Xcode
        run: |
          # Keep `.icon` as project icon in source, but skip compiling it in CI.
          # Xcode 26.3 on GitHub runner can crash in CompileAssetCatalogVariant for folder.iconcomposer.icon.
          perl -0pi -e 's/\n\s*0BAF8E632F8B923700C3ADB2 \/\* moaiy_icon\.icon in Resources \*\/,//' Moaiy/Moaiy.xcodeproj/project.pbxproj

      - name: Build
        run: |
          xcodebuild -project Moaiy/Moaiy.xcodeproj \
            -scheme Moaiy \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        run: |
          xcodebuild test -project Moaiy/Moaiy.xcodeproj \
            -scheme MoaiyTests \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

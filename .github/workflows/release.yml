name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z)"
        required: true
        type: string
      mode:
        description: "Release mode"
        required: true
        default: draft
        type: choice
        options:
          - draft
          - publish
      signing:
        description: "Signing strategy"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - unsigned
          - signed
      gate:
        description: "Validation gate level"
        required: true
        default: balanced
        type: choice
        options:
          - balanced
          - strict
          - fast

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  release_build:
    runs-on: macos-latest
    timeout-minutes: 120
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      target_commit: ${{ steps.release.outputs.target_commit }}
      release_dir_name: ${{ steps.bundle.outputs.release_dir_name }}
      arm64_dmg_name: ${{ steps.bundle.outputs.arm64_dmg_name }}
      x86_64_dmg_name: ${{ steps.bundle.outputs.x86_64_dmg_name }}
      sha256_name: ${{ steps.bundle.outputs.sha256_name }}
      manifest_name: ${{ steps.bundle.outputs.manifest_name }}
      notes_name: ${{ steps.bundle.outputs.notes_name }}
      bundle_archive_name: ${{ steps.bundle.outputs.bundle_archive_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Validate input format
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match X.Y.Z"
            exit 1
          fi

      - name: Preflight main alignment and required check
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_TOKEN != '' && secrets.RELEASE_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail

          TAG="v${{ github.event.inputs.version }}"
          git fetch origin main --prune
          MAIN_SHA="$(git rev-parse origin/main)"
          HEAD_SHA="$(git rev-parse HEAD)"

          echo "origin/main: $MAIN_SHA"
          echo "HEAD       : $HEAD_SHA"
          echo "tag        : $TAG"

          if [[ "$HEAD_SHA" != "$MAIN_SHA" ]]; then
            echo "Release must run on the latest origin/main commit."
            exit 1
          fi

          resolve_remote_tag_commit() {
            local tag_name="$1"
            local peeled_sha
            peeled_sha="$(git ls-remote --tags origin "refs/tags/${tag_name}^{}" | awk '{print $1}' | head -n 1 || true)"
            if [[ -n "$peeled_sha" ]]; then
              printf '%s\n' "$peeled_sha"
              return 0
            fi
            git ls-remote --tags origin "refs/tags/${tag_name}" | awk '{print $1}' | head -n 1 || true
          }

          REMOTE_TAG_SHA="$(resolve_remote_tag_commit "$TAG")"
          if [[ -z "$REMOTE_TAG_SHA" ]]; then
            echo "Release tag $TAG does not exist on origin."
            echo "Create $TAG on origin/main ($MAIN_SHA) before running the Release workflow."
            exit 1
          fi

          if [[ "$REMOTE_TAG_SHA" != "$MAIN_SHA" ]]; then
            echo "Release tag $TAG points to $REMOTE_TAG_SHA, expected $MAIN_SHA (origin/main)."
            echo "Move $TAG to origin/main or rerun workflow for the tagged commit."
            exit 1
          fi

          bash ./scripts/release/check_required_check.sh \
            --repo "${{ github.repository }}" \
            --commit "$MAIN_SHA" \
            --check-name "build-and-test" \
            --wait-seconds 180 \
            --poll-interval 10

      - name: Release orchestration (gates + packaging + metadata + notes)
        id: release
        run: |
          set -euo pipefail
          chmod +x ./scripts/package_dmg.sh
          chmod +x ./scripts/release/*.sh

          ./scripts/release/run_release.sh \
            --version "${{ github.event.inputs.version }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --signing "${{ github.event.inputs.signing }}" \
            --gate "${{ github.event.inputs.gate }}" \
            --allow-existing-tag \
            --github-output "$GITHUB_OUTPUT"

      - name: Prepare release bundle metadata
        id: bundle
        run: |
          set -euo pipefail

          RELEASE_DIR="${{ steps.release.outputs.release_dir }}"
          ARM64_DMG_PATH="${{ steps.release.outputs.arm64_dmg_path }}"
          X64_DMG_PATH="${{ steps.release.outputs.x86_64_dmg_path }}"
          SHA256_PATH="${{ steps.release.outputs.release_sha256_path }}"
          MANIFEST_PATH="${{ steps.release.outputs.release_manifest_path }}"
          NOTES_PATH="${{ steps.release.outputs.release_notes_path }}"

          if [[ ! -d "$RELEASE_DIR" ]]; then
            echo "ERROR: release directory missing: $RELEASE_DIR"
            exit 1
          fi

          echo "release_dir_name=$(basename "$RELEASE_DIR")" >> "$GITHUB_OUTPUT"
          echo "arm64_dmg_name=$(basename "$ARM64_DMG_PATH")" >> "$GITHUB_OUTPUT"
          echo "x86_64_dmg_name=$(basename "$X64_DMG_PATH")" >> "$GITHUB_OUTPUT"
          echo "sha256_name=$(basename "$SHA256_PATH")" >> "$GITHUB_OUTPUT"
          echo "manifest_name=$(basename "$MANIFEST_PATH")" >> "$GITHUB_OUTPUT"
          echo "notes_name=$(basename "$NOTES_PATH")" >> "$GITHUB_OUTPUT"
          echo "bundle_archive_name=$(basename "$RELEASE_DIR").tar.gz" >> "$GITHUB_OUTPUT"

      - name: Archive release bundle
        id: archive
        run: |
          set -euo pipefail

          RELEASE_DIR="${{ steps.release.outputs.release_dir }}"
          ARCHIVE_NAME="${{ steps.bundle.outputs.bundle_archive_name }}"
          ARCHIVE_PATH="$RUNNER_TEMP/$ARCHIVE_NAME"

          tar -C "$(dirname "$RELEASE_DIR")" -czf "$ARCHIVE_PATH" "$(basename "$RELEASE_DIR")"
          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle-${{ github.event.inputs.version }}
          path: ${{ steps.archive.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 7

  release_publish:
    needs: release_build
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: release-bundle-${{ github.event.inputs.version }}
          path: ${{ runner.temp }}/release-bundle

      - name: Extract release bundle and resolve paths
        id: paths
        run: |
          set -euo pipefail

          ARCHIVE_PATH="${{ runner.temp }}/release-bundle/${{ needs.release_build.outputs.bundle_archive_name }}"
          if [[ ! -f "$ARCHIVE_PATH" ]]; then
            echo "ERROR: release bundle archive missing: $ARCHIVE_PATH"
            ls -la "${{ runner.temp }}/release-bundle" || true
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/dist/release"
          tar -C "$GITHUB_WORKSPACE/dist/release" -xzf "$ARCHIVE_PATH"

          RELEASE_DIR="$GITHUB_WORKSPACE/dist/release/${{ needs.release_build.outputs.release_dir_name }}"
          ASSET_DIR="$RELEASE_DIR/assets"
          ARM64_DMG_PATH="$ASSET_DIR/${{ needs.release_build.outputs.arm64_dmg_name }}"
          X64_DMG_PATH="$ASSET_DIR/${{ needs.release_build.outputs.x86_64_dmg_name }}"
          SHA256_PATH="$RELEASE_DIR/${{ needs.release_build.outputs.sha256_name }}"
          MANIFEST_PATH="$RELEASE_DIR/${{ needs.release_build.outputs.manifest_name }}"
          NOTES_PATH="$RELEASE_DIR/${{ needs.release_build.outputs.notes_name }}"

          for path in "$ARM64_DMG_PATH" "$X64_DMG_PATH" "$SHA256_PATH" "$MANIFEST_PATH" "$NOTES_PATH"; do
            if [[ ! -f "$path" ]]; then
              echo "ERROR: expected release file missing: $path"
              exit 1
            fi
          done

          echo "release_dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"
          echo "arm64_dmg_path=$ARM64_DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "x86_64_dmg_path=$X64_DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "sha256_path=$SHA256_PATH" >> "$GITHUB_OUTPUT"
          echo "manifest_path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"
          echo "notes_path=$NOTES_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify tag still matches release commit
        run: |
          set -euo pipefail

          TAG="${{ needs.release_build.outputs.release_tag }}"
          EXPECTED_SHA="${{ needs.release_build.outputs.target_commit }}"
          resolve_remote_tag_commit() {
            local tag_name="$1"
            local peeled_sha
            peeled_sha="$(git ls-remote --tags origin "refs/tags/${tag_name}^{}" | awk '{print $1}' | head -n 1 || true)"
            if [[ -n "$peeled_sha" ]]; then
              printf '%s\n' "$peeled_sha"
              return 0
            fi
            git ls-remote --tags origin "refs/tags/${tag_name}" | awk '{print $1}' | head -n 1 || true
          }

          REMOTE_TAG_SHA="$(resolve_remote_tag_commit "$TAG")"

          if [[ -z "$REMOTE_TAG_SHA" ]]; then
            echo "ERROR: release tag not found on origin: $TAG"
            exit 1
          fi

          if [[ "$REMOTE_TAG_SHA" != "$EXPECTED_SHA" ]]; then
            echo "ERROR: release tag $TAG points to $REMOTE_TAG_SHA, expected $EXPECTED_SHA"
            exit 1
          fi

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_TOKEN != '' && secrets.RELEASE_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail

          TAG="v${{ github.event.inputs.version }}"
          REPO="${{ github.repository }}"
          NOTES="${{ steps.paths.outputs.notes_path }}"

          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TAG" \
              --notes-file "$NOTES" \
              --verify-tag \
              --draft
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_TOKEN != '' && secrets.RELEASE_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail

          TAG="v${{ github.event.inputs.version }}"
          REPO="${{ github.repository }}"

          gh release upload "$TAG" \
            "${{ steps.paths.outputs.arm64_dmg_path }}" \
            "${{ steps.paths.outputs.x86_64_dmg_path }}" \
            "${{ steps.paths.outputs.sha256_path }}" \
            "${{ steps.paths.outputs.manifest_path }}" \
            --repo "$REPO" \
            --clobber

      - name: Finalize release metadata
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_TOKEN != '' && secrets.RELEASE_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail

          TAG="v${{ github.event.inputs.version }}"
          MODE="${{ github.event.inputs.mode }}"
          REPO="${{ github.repository }}"
          NOTES="${{ steps.paths.outputs.notes_path }}"

          if [[ "$MODE" == "draft" ]]; then
            gh release edit "$TAG" --repo "$REPO" --title "$TAG" --notes-file "$NOTES" --draft
          else
            gh release edit "$TAG" --repo "$REPO" --title "$TAG" --notes-file "$NOTES" --draft=false
          fi

      - name: Verify GitHub release state and asset digests
        env:
          GH_TOKEN: ${{ secrets.RELEASE_ADMIN_TOKEN != '' && secrets.RELEASE_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail

          bash ./scripts/release/verify_github_release.sh \
            --repo "${{ github.repository }}" \
            --tag "v${{ github.event.inputs.version }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --arm64-dmg-path "${{ steps.paths.outputs.arm64_dmg_path }}" \
            --x86-64-dmg-path "${{ steps.paths.outputs.x86_64_dmg_path }}" \
            --sha256-path "${{ steps.paths.outputs.sha256_path }}" \
            --manifest-path "${{ steps.paths.outputs.manifest_path }}" \
            --wait-seconds 180 \
            --poll-interval 5
